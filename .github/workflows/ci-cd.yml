name: CI/CD

on:
  push:
    branches:
      - main
      - feature/cicd-testing
  pull_request:
    branches:
      - main
      - feature/cicd-testing

permissions:
  contents: read
  packages: write

concurrency:
  group: labintel-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Install, Test, and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: /api/v1
          VITE_API_BASE_URL: /api/v1
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build

  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: validate
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        shell: bash
        run: |
          REPO_LC="${GITHUB_REPOSITORY,,}"
          REF_TAG="${GITHUB_REF_NAME//\//-}"
          echo "FRONTEND_IMAGE=ghcr.io/${REPO_LC}/frontend" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=ghcr.io/${REPO_LC}/backend" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${REF_TAG}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: frontend
          push: ${{ github.event_name == 'push' }}
          build-args: |
            VITE_API_URL=/api/v1
            VITE_API_BASE_URL=/api/v1
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: backend
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs:
      - validate
      - docker
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/cicd-testing')
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    steps:
      - name: Deploy over SSH with Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_BRANCH: ${{ github.ref_name }}
          APP_DIR: ${{ secrets.VPS_APP_DIR }}
          BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          fingerprint: ${{ secrets.VPS_SSH_FINGERPRINT }}
          envs: DEPLOY_BRANCH,APP_DIR,BACKEND_ENV_FILE
          script: |
            set -euo pipefail
            APP_DIR="${APP_DIR:-/opt/labintel}"
            BACKEND_ENV_FILE="${BACKEND_ENV_FILE:-./backend/.env.production}"
            export APP_DIR DEPLOY_BRANCH BACKEND_ENV_FILE
            bash "$APP_DIR/scripts/deploy-vps.sh"
